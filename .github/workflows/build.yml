name: Build APK

# Builds the debug APK on GitHub's servers. Triggers on push or manually
# from the Actions tab. It expects the project bundled as astraldrift.zip
# at the repo root; this workflow unzips it, then builds.
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Unzip the project
        run: |
          if [ -f astraldrift.zip ]; then
            unzip -o astraldrift.zip -d .
          fi
          ls -la

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        run: gradle :app:assembleDebug --stacktrace --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: astraldrift-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

